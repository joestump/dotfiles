# Non-secret template data, shared across every machine. Reference these in any
# `.tmpl` file as {{ .signalNumber }} etc. This file is committed and NOT encrypted
# — it's for config, not secrets (secrets come from OpenBao at runtime).
#
# Single source of truth for values that were previously hardcoded in many places.
# To change one, edit here and `chezmoi apply`.

# Joe's Signal note-to-self number (E.164). Backs the signal-cli daemon + the Signal
# MCP (--user-id) + scheduled-task summaries. Quoted so YAML keeps it a string.
signalNumber: "+12062257886"

# Contact email. Not currently referenced anywhere (the repo had no real email — the
# joestump@host strings are SSH targets), but kept here as the single place to set it
# if a template ever needs {{ .email }}.
email: "joe@stump.rocks"

# Forge username — the Gitea AND GitHub handle (same on both). Used in repo/external
# URLs, the Gitea git-credential helper, czinit, and the claude-plugins sources. Fork
# this repo? Set this to your own handle and everything re-points. Distinct from
# {{ .chezmoi.username }} (the OS login user), which stays machine-derived.
githubUser: "joestump"

# Shlink (URL shortener) base URL — non-secret config for the shlink OMZ plugin,
# exported as SHLINK_API_URL from env.zsh. The API KEY is the secret half and comes
# from OpenBao (secret/users/<you>/shlink → SHLINK_API_KEY), NOT here.
shlinkApiUrl: "https://u.stu.mp"

# LiteLLM gateway (OpenAI-compatible) base URL. Single source of truth for the
# OPENAI_BASE_URL export in env.zsh and the crush `litellm` provider base_url. The
# API KEY is the secret half and comes from OpenBao (secret/users/<you>/llm →
# LITELLM_API_KEY), NOT here.
litellmUrl: "https://litellm.stump.rocks/v1"

# crush fork — Joe's agent-account fork of Charm's Crush, built from source by
# run_after_install-crush (the fork keeps the upstream module path + ships no
# release binaries, so it can't be `go install`-ed). Lives on joestump-agent (NOT
# {{ .githubUser }}) because that account maintains it. Single source of truth for
# both the .chezmoiexternal.toml clone URL and the build script's remote guard.
crushRepo: "https://github.com/joestump-agent/crush.git"

# OpenBao / Vault server address. Single source of truth for the agent config
# (agent.hcl), the systemd units + launchd plists that run it, and the czu updater.
# Referenced as {{ .vaultAddr }} in those *.tmpl files; the Consul-Template *.ctmpl
# files read it from the agent's env ({{ env "VAULT_ADDR" }}) since chezmoi does not
# template them.
vaultAddr: "https://vault.stump.rocks"
