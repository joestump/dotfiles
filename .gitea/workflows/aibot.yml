# AI bot for this repo: automatic code review on every PR push (Crush + Z.ai GLM),
# plus the on-demand author-self-reference modes (review / address / merge).
# entrypoint.sh re-checks the trigger authoritatively; the `if:` below is just a
# cheap pre-filter so the container doesn't spin up for every comment.
name: aibot

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]   # automatic code review
  issue_comment:
    types: [created]            # PR conversation comments → review / merge
  pull_request_review_comment:
    types: [created]            # author's inline review comments → address
  pull_request_review:
    types: [submitted]          # formal Approve → merge

permissions:
  contents: write               # push commits in `address` mode; merge in `merge` mode
  pull-requests: write          # post reviews / comments
  issues: write                 # comment on issues

jobs:
  aibot:
    runs-on: ubuntu-latest
    # Cheap gate: auto-review on non-draft PR events, else only when the actor is
    # the PR's own author. (entrypoint.sh loop-guards the bot's own pushes.)
    if: >
      (github.event_name == 'pull_request'
        && github.event.pull_request.draft == false)
      ||
      (github.event_name == 'issue_comment'
        && github.event.issue.pull_request != null
        && github.event.comment.user.login == github.event.issue.user.login)
      ||
      (github.event_name == 'pull_request_review_comment'
        && github.event.sender.login == github.event.pull_request.user.login)
      ||
      (github.event_name == 'pull_request_review'
        && github.event.sender.login == github.event.pull_request.user.login)
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          # PR branch so `address` mode can commit + push back to it.
          ref: ${{ github.event.pull_request.head.ref || github.head_ref }}
          fetch-depth: 0

      - name: AI bot
        # Full URL is required on Gitea: a bare `owner/repo` resolves against
        # github.com (404), not your local instance. (Or set the instance's
        # [actions] DEFAULT_ACTIONS_URL = self to allow the bare form.)
        uses: https://gitea.stump.rocks/stumpcloud/gitea-aibot-action@main
        env:
          # --- harness selection ----------------------------------------------
          AIBOT_HARNESS: ${{ vars.AIBOT_HARNESS || 'crush' }}          # claude | opencode | crush
          AIBOT_MODEL:   ${{ vars.AIBOT_MODEL   || 'zaicoding/glm-4.7' }}

          # --- Crush harness: Z.ai (GLM coding plan, OpenAI-compatible) --------
          AIBOT_ZAI_BASE_URL:  ${{ secrets.AIBOT_ZAI_BASE_URL }}       # e.g. https://api.z.ai/api/coding/paas/v4
          AIBOT_ZAI_API_TOKEN: ${{ secrets.AIBOT_ZAI_API_TOKEN }}

          # --- claude/opencode harness (optional): LiteLLM gateway ------------
          AIBOT_LITELLM_BASE_URL: ${{ secrets.AIBOT_LITELLM_BASE_URL }}
          AIBOT_LITELLM_API_KEY:  ${{ secrets.AIBOT_LITELLM_API_KEY }}

          # --- Gitea (auto token is enough for same-repo comment + push) ------
          AIBOT_GITEA_HOST:  ${{ github.server_url }}
          AIBOT_GITEA_TOKEN: ${{ github.token }}
          AIBOT_BOT_LOGIN:   ${{ vars.AIBOT_BOT_LOGIN }}               # loop guard (the token's user)

      # Want the bot to reach Outline or any other MCP server? Don't configure it
      # here — declare it in THIS repo's own .mcp.json (Claude Code) / opencode.json
      # (OpenCode) / crush.json (Crush). The bot loads and trusts the repo's MCP
      # servers automatically; only gitea-mcp is bundled. See the action README.
