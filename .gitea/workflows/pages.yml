name: pages
on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.gitea/workflows/pages.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build site
        working-directory: website
        run: |
          npm ci
          npm run build -- --out-dir ../dist

      - name: Deploy to Garage Pages
        uses: joestump/garage-pages-deploy@v1
        with:
          source_dir: dist
          access_key_id: ${{ secrets.PAGES_ACCESS_KEY_ID }}
          secret_access_key: ${{ secrets.PAGES_SECRET_ACCESS_KEY }}
