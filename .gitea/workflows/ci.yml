name: ci
on: [push, pull_request]

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats + zsh
        run: sudo apt-get update && sudo apt-get install -y bats zsh
      - name: BATS suite
        run: bats --print-output-on-failure test/

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install lint tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck zsh jq yamllint python3
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: ShellCheck — plain scripts
        run: |
          git ls-files 'scripts/*.sh' 'run_*.sh' 'dot_config/dotfiles/*.sh' '.githooks/pre-commit' \
            | xargs -r shellcheck -x -e SC1091

      - name: ShellCheck — rendered chezmoi *.sh.tmpl
        run: |
          rc=0
          for f in $(git ls-files '*.sh.tmpl'); do
            echo "::group::$f"
            chezmoi execute-template --source "$PWD" < "$f" | shellcheck -x -e SC1091 - || rc=1
            echo "::endgroup::"
          done
          exit $rc

      - name: zsh -n — shell config
        run: |
          for f in $(git ls-files 'dot_oh-my-zsh/custom/*.zsh') dot_zshrc; do
            echo "zsh -n $f"; zsh -n "$f"
          done

      - name: Validate JSON
        run: for f in $(git ls-files '*.json'); do echo "$f"; jq empty "$f"; done

      - name: Validate TOML
        run: |
          # chezmoi treats `.chezmoi<name>.toml` (e.g. .chezmoiexternal.toml,
          # .chezmoidata.toml) as templates by rule — they can contain {{ }} and
          # aren't valid raw TOML. Render every TOML through chezmoi first (non-
          # template files pass through unchanged) and then validate.
          for f in $(git ls-files '*.toml'); do
            echo "$f"
            chezmoi execute-template --source "$PWD" < "$f" \
              | python3 -c 'import tomllib,sys; tomllib.load(sys.stdin.buffer)'
          done

      - name: yamllint — workflows
        run: |
          yamllint -d "{extends: relaxed, rules: {truthy: disable, line-length: disable, document-start: disable}}" .gitea/workflows

      - name: gitleaks — secret scan
        run: |
          VER=8.30.1
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks detect --source . --no-banner --redact
