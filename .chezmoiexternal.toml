# chezmoi externals — THIS is what makes "my own Oh My Zsh ecosystem" portable.
# On `chezmoi apply`, chezmoi clones these git repos into the target paths and
# keeps them refreshed (refreshPeriod). They are NOT vendored into this repo, so
# the dotfiles repo stays small and the upstreams stay updatable.
#
# Update them on demand with:  chezmoi apply --refresh-externals
# (or they auto-refresh after the refreshPeriod elapses).
#
# Every git-repo external gets `[X.pull] args = ["--ff-only", "--quiet"]` so the
# apply-time refresh is silent — the raw `remote:` / `From …` / `Fast-forward`
# git-pull chatter is what makes `czu` look messy (dotfiles#…). Adding a new
# external? Copy the pull block too. chezmoi has no global default for pull.args.

# ---------- External Oh My Zsh plugins (not bundled with OMZ) ----------
[".oh-my-zsh/custom/plugins/zsh-autosuggestions"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-autosuggestions.git"
    revision = "v0.7.1"
    refreshPeriod = "168h"
[".oh-my-zsh/custom/plugins/zsh-autosuggestions".pull]
    args = ["--ff-only", "--quiet"]

[".oh-my-zsh/custom/plugins/zsh-syntax-highlighting"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-syntax-highlighting.git"
    revision = "0.8.0"
    refreshPeriod = "168h"
[".oh-my-zsh/custom/plugins/zsh-syntax-highlighting".pull]
    args = ["--ff-only", "--quiet"]

[".oh-my-zsh/custom/plugins/zsh-ai"]
    type = "git-repo"
    url = "https://github.com/matheusml/zsh-ai.git"
    revision = "v0.9.3"
    refreshPeriod = "168h"
[".oh-my-zsh/custom/plugins/zsh-ai".pull]
    args = ["--ff-only", "--quiet"]

# shlink — my Shlink (URL shortener) CLI plugin; public Gitea repo, key supplied
# per-machine via $SHLINK_API_KEY (OpenBao). Anyone can reuse it with their own key.
[".oh-my-zsh/custom/plugins/shlink"]
    type = "git-repo"
    url = "https://gitea.stump.rocks/{{ .githubUser }}/shlink-zsh.git"
    refreshPeriod = "168h"
[".oh-my-zsh/custom/plugins/shlink".pull]
    args = ["--ff-only", "--quiet"]

