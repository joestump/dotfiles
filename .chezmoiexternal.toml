# chezmoi externals — THIS is what makes "my own Oh My Zsh ecosystem" portable.
# On `chezmoi apply`, chezmoi clones these git repos into the target paths and
# keeps them refreshed (refreshPeriod). They are NOT vendored into this repo, so
# the dotfiles repo stays small and the upstreams stay updatable.
#
# Update them on demand with:  chezmoi apply --refresh-externals
# (or they auto-refresh after the refreshPeriod elapses).

# ---------- External Oh My Zsh plugins (not bundled with OMZ) ----------
[".oh-my-zsh/custom/plugins/zsh-autosuggestions"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-autosuggestions.git"
    refreshPeriod = "168h"

[".oh-my-zsh/custom/plugins/zsh-syntax-highlighting"]
    type = "git-repo"
    url = "https://github.com/zsh-users/zsh-syntax-highlighting.git"
    refreshPeriod = "168h"

[".oh-my-zsh/custom/plugins/zsh-ai"]
    type = "git-repo"
    url = "https://github.com/matheusml/zsh-ai.git"
    refreshPeriod = "168h"

# shlink — my Shlink (URL shortener) CLI plugin; public Gitea repo, key supplied
# per-machine via $SHLINK_API_KEY (OpenBao). Anyone can reuse it with their own key.
[".oh-my-zsh/custom/plugins/shlink"]
    type = "git-repo"
    url = "https://gitea.stump.rocks/joestump/shlink-zsh.git"
    refreshPeriod = "168h"

# ---------- Themes (install many, swap via ZSH_THEME in ~/.zshrc) ----------
[".oh-my-zsh/custom/themes/spaceship-prompt"]
    type = "git-repo"
    url = "https://github.com/spaceship-prompt/spaceship-prompt.git"
    refreshPeriod = "168h"

[".oh-my-zsh/custom/themes/powerlevel10k"]
    type = "git-repo"
    url = "https://github.com/romkatv/powerlevel10k.git"
    refreshPeriod = "168h"

[".oh-my-zsh/custom/themes/quantum-zsh"]
    type = "git-repo"
    url = "https://github.com/calebephrem/quantum-zsh.git"
    refreshPeriod = "168h"

[".oh-my-zsh/custom/themes/comfyline_prompt"]
    type = "git-repo"
    url = "https://gitlab.com/imnotpua/comfyline_prompt.git"
    refreshPeriod = "168h"

# ---------- Private Claude skills marketplace (Gitea) ----------
# Cloned locally because `claude plugin marketplace add` can't HTTP-fetch a
# private Gitea repo (404). chezmoi keeps it synced (refreshPeriod); the plugin
# install script adds it as a local-path marketplace.
[".config/claude-marketplaces/claude-personal"]
    type = "git-repo"
    url = "https://gitea.stump.rocks/joestump/claude-personal.git"
    # 24h so newly-pushed skills propagate within a day; the plugin install
    # script reinstalls when this clone's HEAD moves. For an immediate pull:
    # `chezmoi apply --refresh-externals`.
    refreshPeriod = "24h"

{{ if ne .chezmoi.os "darwin" -}}
# ---------- Signal MCP server (Linux only) ----------
# The Signal MCP (a JSON-RPC client for the signal-cli daemon) is launched with
# `uv run --directory ~/src/signal-mcp`. On macOS this is Joe's own dev checkout,
# so chezmoi must NOT manage it there — clone it only on Linux utility nodes.
# Pinned to feat/parse-reactions: the branch carrying the daemon-rewrite the Mac
# runs. When that's reconciled into main, switch this to the default branch.
["src/signal-mcp"]
    type = "git-repo"
    url = "https://github.com/joestump/signal-mcp.git"
    refreshPeriod = "168h"
["src/signal-mcp".clone]
    args = ["--branch", "feat/parse-reactions", "--single-branch"]
["src/signal-mcp".pull]
    args = ["--ff-only"]
{{ end -}}
